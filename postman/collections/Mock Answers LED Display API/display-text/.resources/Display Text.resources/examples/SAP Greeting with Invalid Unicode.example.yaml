$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "Hello SAP 👋"}'
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": false, "error": "Invalid characters detected", "message":
      "Unicode emoji (👋) is not supported. Please use predefined icon codes
      like :smile: instead."}'
order: 45000
