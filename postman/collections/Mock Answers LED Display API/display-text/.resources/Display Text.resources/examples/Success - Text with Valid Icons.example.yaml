$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: "{\"text\": \"I :heart: Postman :smile: You're a :star:\"}"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "message": "Display updated successfully",
        "displayedText": "I :heart: Postman :smile: You're a :star:"
      }
order: 4000
