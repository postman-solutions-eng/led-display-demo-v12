$kind: http-example
name: Text with heart icon code
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "I :heart: Postman"}'
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": true, "message": "Text displayed successfully", "text": "I
      :heart: Postman"}'
order: 24000
