$kind: http-example
request:
  url: "{{baseUrl}}/display"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "Happy :smile: Day"}'
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": true, "message": "Text displayed successfully", "text":
      "Happy :smile: Day"}'
order: 19000
