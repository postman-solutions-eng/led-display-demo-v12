$kind: http-example
name: Text with smile icon code
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "Happy :smile: Day"}'
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": true, "message": "Text displayed successfully", "text":
      "Happy :smile: Day"}'
order: 23000
