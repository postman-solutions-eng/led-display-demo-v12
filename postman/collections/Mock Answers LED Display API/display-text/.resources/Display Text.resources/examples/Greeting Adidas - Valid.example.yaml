$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "Hello Adidas :star:"}'
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": true, "message": "Display updated successfully",
      "displayedText": "Hello Adidas :star:"}'
order: 49000
