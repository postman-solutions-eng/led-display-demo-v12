$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"text": "Hello Adidas 🎉"}'
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"success": false, "error": "Invalid characters detected", "message":
      "Unicode emoji (🎉) is not supported. Please use only supported characters
      and icon codes like :star:, :heart:, etc."}'
order: 50000
