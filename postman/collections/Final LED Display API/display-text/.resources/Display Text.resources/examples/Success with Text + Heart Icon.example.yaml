$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-API-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "text": "Hello World!"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
    Server: Werkzeug/3.1.5 Python/3.13.7
    Date: Mon, 19 Jan 2026 12:16:21 GMT
    Content-Length: "65"
    Connection: close
  body:
    type: json
    content: |-
      {
        "status": "Text displayed on LED",
        "text": "Hello World! :heart:"
      }
order: 1000
