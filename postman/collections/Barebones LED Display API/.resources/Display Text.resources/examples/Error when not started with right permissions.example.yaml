$kind: http-example
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "text": "Hello World!"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Server: Werkzeug/3.1.4 Python/3.13.5
    Date: Mon, 19 Jan 2026 12:16:58 GMT
    Content-Length: "265"
    Connection: close
    Content-Type: text/html; charset=utf-8
  body:
    type: text
    content: <!doctype html><html lang=en><title>500 Internal Server
      Error</title><h1>Internal Server Error</h1><p>The server encountered an
      internal error and was unable to complete your request. Either the server
      is overloaded or there is an error in the application.</p>
order: 3000
