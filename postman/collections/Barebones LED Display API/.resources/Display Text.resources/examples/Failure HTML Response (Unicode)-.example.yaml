$kind: http-example
name: Failure HTML Response (Unicode)?
request:
  url: "{{baseUrl}}/display-text"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "text": "Hello World! 🌍"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
    Server: Werkzeug/3.1.4 Python/3.13.5
    Date: Mon, 19 Jan 2026 12:47:31 GMT
    Content-Length: "69"
    Connection: close
  body:
    type: json
    content: |-
      {
        "details": "'🌍'",
        "error": "Invalid display string format"
      }
order: 2000
